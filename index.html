<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butt Grill & Family Restaurant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .logo-container {
            margin-bottom: 30px;
            text-align: center;
        }
        .logo-container img {
            max-width: 150px;
            height: auto;
            border-radius: 8px;
        }
        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }
        .btn {
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #d9534f;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #c9302c;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="Butt Grill .jpg s00asd.JPG.jpeg" alt="Butt Grill Logo">
    </div>

    <div class="buttons-container">
        <a href="#" class="btn">POS System</a>
        <a href="#" class="btn">Delivery Tracking</a>
        <a href="#" class="btn">Menu Costs</a>
        <a href="#" class="btn">Reports</a>
    </div>

</body>
</html>
